{% extends "admin/base.html" %}

{% block title %}{{ title }} | Academic LMS Administration{% endblock %}

{% block extrastyle %}
<style>
/* Coursera-inspired Admin Overrides */
:root {
    --admin-primary: #0056D2;
    --admin-bg: #F5F7F8;
    --admin-text: #1F1F1F;
}

#header {
    background-color: var(--admin-primary) !important;
    color: #fff;
    padding: 15px 40px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

#branding h1 {
    color: #fff;
    font-weight: 700;
    font-size: 1.25rem;
    letter-spacing: -0.5px;
}

#branding h1 a {
    color: #fff !important;
}

.module h2, .module caption, .inline-group h2 {
    background: #FFFFFF !important;
    color: var(--admin-primary) !important;
    border-bottom: 2px solid var(--admin-primary);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
}

.button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: var(--admin-primary) !important;
    border-radius: 4px !important;
    font-weight: 700 !important;
    padding: 10px 20px !important;
    border: none !important;
}

.button:hover, input[type=submit]:hover, input[type=button]:hover {
    background: #00419e !important;
}

body {
    background-color: var(--admin-bg);
    font-family: 'Inter', 'Open Sans', sans-serif;
}

#content-main {
    padding: 40px;
}

.card, .module {
    border: 1px solid #D1D7DC !important;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05) !important;
    border-radius: 8px !important;
}
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}" style="color:white; text-decoration: none;">Academic LMS Admin Station</a></h1>
{% endblock %}
