{% extends 'base.html' %}
{% block title %}Reset Password - Academic LMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4">
            <h2 class="fw-bold mb-3">Forgot Password?</h2>
            <p class="text-muted mb-4">Enter your email address and we'll send you an OTP to reset your password.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Send OTP</button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none small">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
