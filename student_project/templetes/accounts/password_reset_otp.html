{% extends 'base.html' %}
{% block title %}Verify OTP - Academic LMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4">
            <h2 class="fw-bold mb-3">Verify OTP</h2>
            <p class="text-muted mb-4">We've sent a 6-digit code to your email. Please enter it below to continue.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form.otp_code }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Verify & Continue</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
