{% extends 'base.html' %}
{% block title %}Sign In - Framework{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm p-4 mt-5">
            <h3 class="text-center mb-4 fw-bold">Sign In</h3>
            
            <form method="post">
                {% csrf_token %}
                {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label fw-bold small text-uppercase text-muted">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="id_password" class="form-label mb-0 fw-bold small text-uppercase text-muted">Password</label>
                        <a href="{% url 'accounts:password_reset' %}" class="text-decoration-none small fw-bold">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" id="id_password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn">Show</button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-secondary mb-1" style="font-size: 0.9rem;">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-decoration-none" style="color: #1a73e8; font-weight: 500;">Create one</a></p>
                <p class="text-secondary" style="font-size: 0.85rem;">Interested in teaching? <a href="{% url 'accounts:instructor_signup' %}" class="text-decoration-none fw-bold" style="color: #4285f4;">Join as Instructor</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePasswordBtn').addEventListener('click', function () {
        const passwordInput = document.getElementById('id_password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? 'Show' : 'Hide';
    });
</script>
{% endblock %}
