{% extends 'base.html' %}
{% block title %}Draft Email - Admin Console{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="{% url 'courses:admin_analytics' %}" class="btn btn-light btn-sm rounded-circle me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2 class="fw-bold mb-0">Communicate with Users</h2>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">Recipient Group</label>
                        <select name="recipient_type" class="form-select rounded-3 p-3">
                            <option value="all">All Registered Users</option>
                            <option value="students">Students Only</option>
                            <option value="instructors">Instructors Only</option>
                        </select>
                        <div class="form-text mt-2">Emails will be sent to the primary address associated with each account.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">Subject Line</label>
                        <input type="text" name="subject" class="form-control rounded-3 p-3" placeholder="e.g., Important Update Regarding Platform Maintenance" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-muted">Message Body</label>
                        <textarea name="body" class="form-control rounded-3 p-3" rows="8" placeholder="Type your message here..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-3 rounded-pill fw-bold">
                            <i class="bi bi-send me-2"></i> Dispatch Email
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
