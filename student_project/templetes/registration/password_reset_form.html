{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card card-material p-4 p-md-5">
            <h2 class="mb-2 text-center" style="font-weight: 500; color: #202124;">Reset password</h2>
            <p class="text-center text-secondary mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-google w-100 py-2 fs-5 mt-3">Send reset link</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none fw-bold" style="color: #1a73e8;">Back to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
