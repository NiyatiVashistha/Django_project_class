{% extends 'base.html' %}
{% block title %}Contact Us - Academic LMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-material border-0 shadow-sm p-4 rounded-4">
                <h2 class="fw-bold mb-4 text-center">Contact Us</h2>
                <p class="text-center text-muted mb-4">Have questions? We'd love to hear from you. Fill out the form below and we will get back to you as soon as possible.</p>
                
                <form method="post" action="{% url 'courses:contact' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Full Name</label>
                        <input type="text" class="form-control p-2" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control p-2" id="email" name="email" required placeholder="john@example.com">
                    </div>
                    
                    <div class="mb-3">
                        <label for="subject" class="form-label fw-bold">Subject</label>
                        <select class="form-select p-2" id="subject" name="subject" required>
                            <option value="">Choose a subject...</option>
                            <option value="support">Technical Support</option>
                            <option value="billing">Billing Inquiry</option>
                            <option value="feedback">General Feedback</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label for="message" class="form-label fw-bold">Message</label>
                        <textarea class="form-control p-2" id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
